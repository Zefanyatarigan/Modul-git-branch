<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zefanya Project Tugas 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Data Produk</h1>

    <form id="formProduk">
      <input type="text" id="nama_produk" placeholder="Nama Produk" required>
      <input type="number" id="harga" placeholder="Harga" required>
      <input type="number" id="stok" placeholder="Stok" required>
      <button type="submit">Simpan</button>
    </form>

    <h2>Daftar Produk</h2>
    <ul id="listProduk"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
